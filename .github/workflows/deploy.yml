name: Build and Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Login en Celerisys Hub
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.HUB_HOST }}
          username: ${{ secrets.HUB_USERNAME }}
          password: ${{ secrets.HUB_TOKEN }}

      - name: Build & Push
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --push \
            --build-arg BUILD_CONFIGURATION=Release \
            --target final \
            -t ${{ secrets.HUB_HOST }}/${{ secrets.HUB_REPOSITORY }}:latest \
            -f Dockerfile .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Desplegar en VPS vía SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker stack deploy --with-registry-auth -c compose-front-erp3.yml erp3-front
            docker image prune -af --filter "until=24h"
