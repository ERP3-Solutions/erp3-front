name: Build and Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Login en Celerisys Hub
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.HUB_HOST }}
          username: ${{ secrets.HUB_USERNAME }}
          password: ${{ secrets.HUB_PASSWORD }}
          
      - name: Construir imagen para Academy FRONT
        run: |
          docker build --no-cache \
            -t ${{ secrets.HUB_HOST }}/${{ secrets.HUB_REPOSITORY }}:latest \
            -f Dockerfile .

      - name: Enviar imagen a Celerisys Hub
        run: |
          docker push ${{ secrets.HUB_HOST }}/${{ secrets.HUB_REPOSITORY }}:latest


  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
      - name: Desplegar en VPS vía SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker stack deploy --with-registry-auth -c compose.yml academy
            docker service update --force academy_academy_front
            docker image prune -af --filter "until=24h"
