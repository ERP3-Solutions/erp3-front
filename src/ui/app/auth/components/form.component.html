<form class="flex flex-col gap-4 dark:text-surface-on-surface text-light-surface-on-surface" novalidate>
  <div class="flex flex-col gap-2">
    <h2 class="font-semibold text-sm sm:text-base">{{ title() }}</h2>
    <p class="text-xs sm:text-sm font-normal mb-4">{{ subtitle() }}</p>
    <div class="flex flex-col gap-6">
      <!-- Input -->
      <div class="flex flex-col gap-3">
        <ng-content select="[inputs]"></ng-content>
        <!-- Options -->
        <ng-content select="[options]"></ng-content>
      </div>
      <!-- Button -->
      <div class="flex flex-col gap-2">
        <c-app-button
          type="button"
          color="accent"
          typeButton="flat"
          (clickButton)="clickPrimaryButton.emit()"
          [disabled]="loading()"
        >
          @if (loading()) {
            <c-app-icon 
              className="w-6 h-6 dark:fill-primary-on-primary fill-light-primary-on-primary animate-spin"
              svgIcon="outlined-progress-activity"
              svgModule="shared"
            />
          } @else {
            {{ submitText() }}
          }
        </c-app-button>
        @if (submitTextSecondary()) {
          <c-app-button
            type="button"
            color="accent"
            typeButton="stroked"
            (clickButton)="clickSecondaryButton.emit()"
          >
            {{ submitTextSecondary() }}
          </c-app-button>
        }
      </div>
    </div>
  </div>
  <footer class="flex flex-col items-center min-[420px]:flex-row min-[420px]:justify-center gap-3">
    <p class="font-normal text-sm">{{ footerText() }}</p>
    <a class="dark:text-tertiary-40 text-tertiary-30 dark:hover:text-tertiary-60 hover:text-tertiary-50 transition-colors font-semibold text-sm" [routerLink]="footerLinkRouter()">
      {{ footerTextLink() }}
    </a>
  </footer>
</form>
