<div class="flex gap-1.5">
  @for (validator of validators; track $index) {
    <span [ngClass]="{
      'h-1 w-full rounded-3xl': true,
      'bg-primary-40': strengthPoints > $index,
      'bg-primary-70': strengthPoints <= $index,
    }"></span>
  }
</div>
@if (strengthMessage) {
  <div class="px-4 pt-1">
    <p class="text-secondary-40 text-sm text-center">{{ strengthMessage }}</p>
  </div>
}
