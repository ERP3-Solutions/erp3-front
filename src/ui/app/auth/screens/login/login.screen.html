<c-auth-form
  [title]="'Welcome again'"
  [subtitle]="'Please enter your account details'"
  [footerText]="'¿No tienes una cuenta?'"
  [footerTextLink]="'Registrarse'"
  [footerLinkRouter]="'/auth/register'"
  [submitText]="'Iniciar sesión'"
  [formGroup]="authService.formLogin"
  (submit)="iniciarSesion()"
  [loading]="false"
>
  <ng-container inputs>
    <c-app-form-field 
      textLabel="Email"
      placeholder="Enter your email"
      type="text"
      name="email"
      [formData]="authService.formLogin"
    ></c-app-form-field>
    <c-app-form-field 
      textLabel="Password"
      placeholder="Enter your password"
      [type]="hidePassword() ? 'password' : 'text'"
      name="password"
      [formData]="authService.formLogin"
    >
      <ng-container suffix>
        <c-app-button 
          type="button"
          typeButton="icon"
          (click)="hidePassword.set(!hidePassword())" 
        >
          <c-app-icon 
            className="w-6 h-6 fill-primary-50"
            [svgIcon]="hidePassword() ? 'outlined-visibility_off' : 'outlined-visibility'"
            svgModule="auth"
          />
        </c-app-button>
      </ng-container>
    </c-app-form-field>
  </ng-container>
</c-auth-form>
