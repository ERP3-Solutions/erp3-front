<c-auth-form
  [title]="translate.tSignal('auth.screens.login.title')()"
  [subtitle]="translate.tSignal('auth.screens.login.subtitle')()"
  [footerText]="translate.tSignal('auth.screens.login.footer-text')()"
  [footerTextLink]="translate.tSignal('auth.screens.login.footer-text-link')()"
  [footerLinkRouter]="'/auth/register'"
  [submitText]="translate.tSignal('auth.screens.login.login-button')()"
  (clickPrimaryButton)="iniciarSesion()"
  [loading]="loginService.loading()"
>
  <ng-container inputs>
    <div class="flex flex-col gap-3 w-70">
      <c-app-form-field 
        [textLabel]="translate.tSignal('auth.screens.login.inputs.email_label')()"
        [placeholder]="translate.tSignal('auth.screens.login.inputs.email_placeholder')()"
        type="text"
        name="email"
        [formData]="loginService.formLogin"
      ></c-app-form-field>
      <c-app-form-field 
        [textLabel]="translate.tSignal('auth.screens.login.inputs.password_label')()"
        [placeholder]="translate.tSignal('auth.screens.login.inputs.password_placeholder')()"
        [type]="hidePassword() ? 'password' : 'text'"
        name="password"
        [formData]="loginService.formLogin"
      >
        <ng-container suffix>
          <c-app-button 
            type="button"
            typeButton="icon"
            (clickButton)="hidePassword.set(!hidePassword())" 
          >
            <c-app-icon 
              className="w-6 h-6 fill-primary-50"
              [svgIcon]="hidePassword() ? 'outlined-visibility_off' : 'outlined-visibility'"
              svgModule="auth"
            />
          </c-app-button>
        </ng-container>
      </c-app-form-field>
    </div>
  </ng-container>
</c-auth-form>
