<div class="flex flex-col gap-3 w-84">
  <div class="flex items-start gap-3">
    <c-app-form-field 
      [textLabel]="translate.tSignal('auth.screens.register.inputs.first-name_label')()"
      [placeholder]="translate.tSignal('auth.screens.register.inputs.first-name_placeholder')()"
      type="text"
      name="firstName"
      [formData]="registerService.formRegisterUser"
    ></c-app-form-field>
    <c-app-form-field 
      [textLabel]="translate.tSignal('auth.screens.register.inputs.last-name_label')()"
      [placeholder]="translate.tSignal('auth.screens.register.inputs.last-name_placeholder')()"
      type="text"
      name="lastName"
      [formData]="registerService.formRegisterUser"
    ></c-app-form-field>
  </div>
  <c-app-form-field 
    [textLabel]="translate.tSignal('auth.screens.register.inputs.email_label')()"
    [placeholder]="translate.tSignal('auth.screens.register.inputs.email_placeholder')()"
    type="text"
    name="emailAddress"
    [formData]="registerService.formRegisterUser"
  ></c-app-form-field>
  <div class="flex flex-col gap-1.5">
    <c-app-form-field 
      [textLabel]="translate.tSignal('auth.screens.register.inputs.password_label')()"
      [placeholder]="translate.tSignal('auth.screens.register.inputs.password_placeholder')()"
      [type]="hidePassword() ? 'password' : 'text'"
      name="password"
      [formData]="registerService.formRegisterUser"
    >
      <ng-container suffix>
        <c-app-button 
          type="button"
          typeButton="icon"
          (click)="hidePassword.set(!hidePassword())" 
        >
          <c-app-icon 
            className="w-6 h-6 fill-primary-50"
            [svgIcon]="hidePassword() ? 'outlined-visibility_off' : 'outlined-visibility'"
            svgModule="auth"
          />
        </c-app-button>
      </ng-container>
    </c-app-form-field>
    @if (registerService.formRegisterUser.get('password')?.value) {
      <c-auth-password-meter [password]="registerService.formRegisterUser.get('password')?.value || ''" />
    }
  </div>
  <c-app-form-field 
    [textLabel]="translate.tSignal('auth.screens.register.inputs.confirm-password_label')()"
    [placeholder]="translate.tSignal('auth.screens.register.inputs.confirm-password_placeholder')()"
    [type]="hidePassword() ? 'password' : 'text'"
    name="confirmPassword"
    [formData]="registerService.formRegisterUser"
  >
    <ng-container suffix>
      <c-app-button 
        type="button"
        typeButton="icon"
        (click)="hidePassword.set(!hidePassword())" 
      >
        <c-app-icon 
          className="w-6 h-6 fill-primary-50"
          [svgIcon]="hidePassword() ? 'outlined-visibility_off' : 'outlined-visibility'"
          svgModule="auth"
        />
      </c-app-button>
    </ng-container>
  </c-app-form-field>
</div>
