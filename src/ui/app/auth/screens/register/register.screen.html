@if (currentForm() !== undefined) {
  <c-auth-form
    [title]="'Bienvenido a AMS'"
    [subtitle]="'Por favor, ingrese sus datos de usuario'"
    [footerText]="'¿Ya tienes una cuenta?'"
    [footerTextLink]="'Iniciar sesión'"
    [footerLinkRouter]="'/auth/login'"
    [submitText]="'Siguiente'"
    [formGroup]="currentForm()!"
    (submit)="validateStep()"
    [submitTextSecondary]="indexStep() > 0 ? 'Volver' : ''"
    (clickSecondaryButton)="step.set(orderSteps[indexStep() - 1])"
    [loading]="registerService.loading()"
  >
    <ng-container inputs>
      @switch (step()) {
        @case (steps.USER_FORM) {
          <f-auth-user-register />
        }
        @case (steps.ORGANIZATION_FORM) {
          <f-auth-organization-register />
        }
      }
    </ng-container>
  </c-auth-form>
}
