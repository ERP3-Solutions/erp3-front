<div class="flex bg-surface-10 h-full overflow-hidden">

    'transition-all duration-300 h-full': true,
    'w-18': !sidebarService.isOpen(),
    'w-64': sidebarService.isOpen()
  }" />

    'transition-all duration-300 flex flex-col flex-1': true,

  </div>
</div>
