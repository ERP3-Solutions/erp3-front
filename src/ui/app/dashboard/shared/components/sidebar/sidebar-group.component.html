<section class="flex flex-col gap-2"> 
  <header 
    [ngClass]="{
      'p-1 text-primary-80 text-xs font-medium': true,
      'text-center': !open()
    }"
  >
    @if (open()) {
      {{ titulo() }}
    } @else {
      {{ tituloInicial() }}
    }
  </header>
  <ng-content></ng-content>
</section>
