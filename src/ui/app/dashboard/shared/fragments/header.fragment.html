<header class="flex items-center p-3 px-6 w-full bg-surface-0 border-surface-20 border-b">
  <c-app-button 
    classButton="p-2"
    type="button"
    typeButton="icon"
    (clickButton)="sidebarService.toggleOpen()"
  >
    <c-app-icon 
      className="w-6 h-6 fill-primary-50"
      svgIcon="menu"
      svgModule="dashboard"
    />
  </c-app-button>

  <nav aria-label="Breadcrumb">
    <ol class="flex items-center gap-2 text-sm">
      <li>
        <a routerLink="/dashboard" 
            class="flex items-center gap-1.5 text-surface-60 hover:text-surface-90 transition-colors">
          <c-app-icon className="w-4 h-4" svgIcon="home" svgModule="dashboard" />
          <span>Dashboard</span>
        </a>
      </li>

      @for (crumb of breadcrumbs; track $index; let last = $last) {
        <li class="flex items-center gap-2">
          <span class="text-surface-40">›</span>
          
          @if (!last) {
            <a [routerLink]="crumb.url"
                class="text-surface-60 hover:text-primary-60 font-medium transition-colors">
              {{ crumb.label }}
            </a>
          } @else {
            <span class="text-surface-90 font-semibold">
              {{ crumb.label }}
            </span>
          }
        </li>
      }
    </ol>
  </nav>

  <div class="ms-auto">
    <div #triggerLanguage>
      <c-app-button 
        classButton="p-2"
        type="button"
        typeButton="icon"
        (clickButton)="menuService.open(triggerLanguage, optionsLanguage)"
      >
        <c-app-icon 
          className="w-6 h-6 fill-primary-50"
          svgIcon="outlined-language"
          svgModule="dashboard"
        />
      </c-app-button>
    </div>
  </div>
</header>

<ng-template #optionsLanguage>
  <ul>
    @for (language of translateService.langPathsTranslate; track $index) {
      <li class="" (click)="changeTranslate(language[0])">
        {{ language[1] }}
      </li>
    }
  </ul>
</ng-template>
