<button 
  [type]="type()"
  [class]="`flex justify-center items-center text-primary-on-primary transition-colors cursor-pointer w-full uppercase text-sm font-medium ${classButton()}`"
  [ngClass]="{
    'bg-primary-20 hover:bg-primary-30 rounded px-4 py-2 active:bg-primary-20': typeButton() === 'flat',
    'hover:bg-primary-on-primary-container active:bg-primary-primary-container rounded-full p-1': typeButton() === 'icon',
  }"
  (click)="click()"
  [disabled]="disabled()"
>
  @if(icon()) {
    <c-app-icon
      [svgModule]="iconModule()"
      [svgIcon]="icon()"
    />
  }
  <ng-content></ng-content>
</button>
