<div
  class="menu-item dark:bg-surface-0 bg-surface-100 border dark:border-surface-20 border-surface-80 rounded shadow-xl overflow-hidden z-50 pointer-events-auto"
  [ngClass]="{
    'animate-notion-fade-in': !closing(),
    'animate-notion-fade-out': closing(),
  }"
  [ngStyle]="style"
>
  <!-- Si se pasa contenido personalizado -->
  @if (templateRef) {
    <ng-container *ngTemplateOutlet="templateRef"></ng-container>
  } 
</div>
