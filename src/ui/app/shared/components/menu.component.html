<div
  class="menu-item bg-surface-0 border border-surface-20 rounded shadow-xl overflow-hidden z-50 pointer-events-auto py-2"
  [ngClass]="{
    'animate-notion-fade-in': !closing(),
    'animate-notion-fade-out': closing(),
  }"
  [ngStyle]="style"
>
  <!-- Si se pasa contenido personalizado -->
  @if (templateRef) {
    <ng-container *ngTemplateOutlet="templateRef"></ng-container>
  } 
</div>
